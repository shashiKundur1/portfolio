name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/shashikundur1/portfolio

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Zero-Downtime Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via blue-green swap
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE
          command_timeout: 5m
          script: |
            set -euo pipefail

            TAG="${IMAGE}:${{ github.sha }}"
            PROXY_CONF="/etc/nginx/conf.d/portfolio.conf"
            BLUE_PORT=8080
            GREEN_PORT=8081

            # --- Determine which slot is currently live ---
            if docker ps --format '{{.Names}}' | grep -q '^portfolio-blue$'; then
              LIVE_SLOT="blue"
              LIVE_PORT=$BLUE_PORT
              NEW_SLOT="green"
              NEW_PORT=$GREEN_PORT
            else
              LIVE_SLOT="green"
              LIVE_PORT=$GREEN_PORT
              NEW_SLOT="blue"
              NEW_PORT=$BLUE_PORT
            fi

            echo "==> Live: portfolio-${LIVE_SLOT} (:${LIVE_PORT})"
            echo "==> Deploying to: portfolio-${NEW_SLOT} (:${NEW_PORT})"

            # --- Login & pull ---
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$TAG"

            # --- Stop any leftover container in the new slot ---
            docker stop "portfolio-${NEW_SLOT}" 2>/dev/null || true
            docker rm "portfolio-${NEW_SLOT}" 2>/dev/null || true

            # --- Start new container on the standby port ---
            docker run -d \
              --name "portfolio-${NEW_SLOT}" \
              -p "${NEW_PORT}:8080" \
              --restart unless-stopped \
              --memory=256m \
              --cpus=0.5 \
              "$TAG"

            # --- Health check: wait up to 30s for the new container ---
            echo "==> Waiting for health check on :${NEW_PORT}..."
            HEALTHY=false
            for i in $(seq 1 15); do
              if curl -sf --max-time 2 "http://127.0.0.1:${NEW_PORT}/health" > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              echo "    attempt ${i}/15..."
              sleep 2
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "==> HEALTH CHECK FAILED. Rolling back."
              docker logs "portfolio-${NEW_SLOT}" --tail 30
              docker stop "portfolio-${NEW_SLOT}" && docker rm "portfolio-${NEW_SLOT}"
              echo "==> Rollback complete. Live container unchanged."
              exit 1
            fi

            echo "==> Health check passed."

            # --- Ensure host nginx is installed ---
            if ! command -v nginx &> /dev/null; then
              echo "==> Installing nginx on host (first-time setup)..."
              apt-get update -qq && apt-get install -y -qq nginx
              # Remove default site
              rm -f /etc/nginx/sites-enabled/default
            fi

            # --- Swap traffic: update proxy config to point at new container ---
            # Use the repo's nginx.conf as the single source of truth
            cp /opt/portfolio/nginx.conf "$PROXY_CONF"
            sed -i "s/127.0.0.1:8080/127.0.0.1:${NEW_PORT}/" "$PROXY_CONF"

            # --- Test and reload nginx (zero-downtime swap) ---
            if ! nginx -t; then
              echo "==> Nginx config test FAILED. Rolling back."
              docker stop "portfolio-${NEW_SLOT}" && docker rm "portfolio-${NEW_SLOT}"
              # Restore previous config by re-copying and setting the live port
              if [ -n "$(docker ps -q -f name=portfolio-${LIVE_SLOT})" ]; then
                cp /opt/portfolio/nginx.conf "$PROXY_CONF"
                sed -i "s/127.0.0.1:8080/127.0.0.1:${LIVE_PORT}/" "$PROXY_CONF"
                nginx -s reload
              fi
              exit 1
            fi

            nginx -s reload
            echo "==> Traffic switched to portfolio-${NEW_SLOT} (:${NEW_PORT})"

            # --- Verify traffic is flowing through the new container ---
            sleep 2
            if ! curl -sf --max-time 5 "http://127.0.0.1:${NEW_PORT}/health" > /dev/null; then
              echo "==> WARNING: Post-switch verification failed"
            else
              echo "==> Post-switch verification passed"
            fi

            # --- Stop old container ---
            if docker ps --format '{{.Names}}' | grep -q "^portfolio-${LIVE_SLOT}$"; then
              echo "==> Stopping old container: portfolio-${LIVE_SLOT}"
              docker stop "portfolio-${LIVE_SLOT}" && docker rm "portfolio-${LIVE_SLOT}"
            fi

            echo "==> Deploy complete: $TAG (slot: ${NEW_SLOT}, port: ${NEW_PORT})"

  cleanup:
    name: Cleanup Old Images
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Remove dangling images
            docker image prune -f

            # Keep only 3 most recent images
            docker images "ghcr.io/*/*" --format '{{.ID}} {{.CreatedAt}}' \
              | sort -k2 -r \
              | tail -n +4 \
              | awk '{print $1}' \
              | xargs -r docker rmi 2>/dev/null || true

            # Clean build cache
            docker builder prune -f --keep-storage=1g 2>/dev/null || true

            echo "Cleanup done. Disk usage:"
            df -h / | tail -1
