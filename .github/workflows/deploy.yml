name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

permissions:
  packages: write

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Droplet
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE
          script: |
            set -e

            TAG="${IMAGE}:${{ github.sha }}"

            # Login to GHCR
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull new image
            docker pull "$TAG"

            # Stop old container
            docker stop portfolio 2>/dev/null || true
            docker rm portfolio 2>/dev/null || true

            # Run new container
            docker run -d \
              --name portfolio \
              -p 80:80 \
              -p 443:443 \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              --restart unless-stopped \
              --memory=256m \
              --cpus=0.5 \
              "$TAG"

            # Healthcheck
            sleep 3
            if ! curl -sf http://localhost > /dev/null; then
              echo "Healthcheck failed — rolling back"
              docker stop portfolio && docker rm portfolio
              docker run -d \
                --name portfolio \
                -p 80:80 \
                -p 443:443 \
                -v /etc/letsencrypt:/etc/letsencrypt:ro \
                --restart unless-stopped \
                --memory=256m \
                --cpus=0.5 \
                "${IMAGE}:latest"
              exit 1
            fi

            echo "Deploy successful: $TAG"

  cleanup:
    name: Cleanup Old Images
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Remove dangling images
            docker image prune -f

            # Keep only 3 most recent images
            docker images "ghcr.io/*/*" --format '{{.ID}} {{.CreatedAt}}' \
              | sort -k2 -r \
              | tail -n +4 \
              | awk '{print $1}' \
              | xargs -r docker rmi 2>/dev/null || true

            # Clean build cache
            docker builder prune -f --keep-storage=1g 2>/dev/null || true

            echo "Cleanup done. Disk usage:"
            df -h / | tail -1
