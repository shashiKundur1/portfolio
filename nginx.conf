# Front-door reverse proxy config
# Deployed to /etc/nginx/conf.d/portfolio.conf on the host
# The upstream port is dynamically rewritten by deploy.yml via:
#   sed -i 's/127.0.0.1:8080/127.0.0.1:<PORT>/' /etc/nginx/conf.d/portfolio.conf

# Rate limiting: 10 req/s per IP, shared 10 MB zone
limit_req_zone $binary_remote_addr zone=portfolio_rl:10m rate=10r/s;

upstream portfolio_backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name shashidev.me www.shashidev.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shashidev.me www.shashidev.me;

    server_tokens off;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/shashidev.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shashidev.me/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        limit_req zone=portfolio_rl burst=20 nodelay;

        proxy_pass http://portfolio_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
